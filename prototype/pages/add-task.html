<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadTask - 快速添加任务</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: flex-end;
            z-index: 1000;
            animation: fadeIn 300ms ease-in-out;
        }

        .modal-sheet {
            width: 100%;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 24px 16px;
            animation: slideUp 300ms ease-in-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #000;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #F2F2F7;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 150ms ease-in-out;
        }

        .modal-close:active {
            background: #E5E5EA;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 150ms ease-in-out;
        }

        .form-input:focus {
            outline: none;
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .form-input::placeholder {
            color: #C7C7CC;
        }

        .form-textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 150ms ease-in-out;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .quadrant-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .quadrant-option {
            padding: 16px;
            border: 2px solid #E5E5EA;
            border-radius: 12px;
            cursor: pointer;
            transition: all 150ms ease-in-out;
            text-align: center;
        }

        .quadrant-option:active {
            border-color: #007AFF;
            background: #E8F4FF;
        }

        .quadrant-option.selected {
            border-color: #007AFF;
            background: #E8F4FF;
        }

        .quadrant-option-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .quadrant-option-label {
            font-size: 13px;
            font-weight: 600;
            color: #000;
        }

        .quadrant-option-desc {
            font-size: 11px;
            color: #8E8E93;
            margin-top: 4px;
        }

        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            background: #F2F2F7;
            border-radius: 8px;
            min-height: 44px;
            align-items: center;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #007AFF;
            color: white;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
        }

        .tag-remove {
            cursor: pointer;
            font-size: 14px;
            transition: opacity 150ms ease-in-out;
        }

        .tag-remove:active {
            opacity: 0.7;
        }

        .tag-input {
            flex: 1;
            min-width: 80px;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
        }

        .tag-input::placeholder {
            color: #C7C7CC;
        }

        .suggestion-box {
            background: #E8F4FF;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            border-left: 4px solid #007AFF;
        }

        .suggestion-title {
            font-size: 12px;
            font-weight: 600;
            color: #007AFF;
            margin-bottom: 6px;
        }

        .suggestion-text {
            font-size: 13px;
            color: #0051D5;
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .form-btn {
            flex: 1;
            height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 150ms ease-in-out;
        }

        .form-btn-primary {
            background: #007AFF;
            color: white;
        }

        .form-btn-primary:active {
            background: #0051D5;
        }

        .form-btn-secondary {
            background: #F2F2F7;
            color: #000;
        }

        .form-btn-secondary:active {
            background: #E5E5EA;
        }

        .time-picker {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .time-input {
            width: 60px;
            height: 44px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Menlo', monospace;
        }

        .time-unit {
            font-size: 14px;
            color: #8E8E93;
        }
    </style>
</head>
<body>
    <div class="modal-backdrop" onclick="closeModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <!-- 头部 -->
            <div class="modal-header">
                <h2 class="modal-title">新建任务</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- 表单 -->
            <form onsubmit="submitTask(event)">
                <!-- 任务标题 -->
                <div class="form-group">
                    <label class="form-label">任务标题 *</label>
                    <input type="text" class="form-input" placeholder="输入任务标题..." id="taskTitle" required>
                </div>

                <!-- 任务描述 -->
                <div class="form-group">
                    <label class="form-label">任务描述</label>
                    <textarea class="form-textarea" placeholder="添加任务描述..." id="taskDesc"></textarea>
                </div>

                <!-- 象限建议 -->
                <div class="suggestion-box">
                    <div class="suggestion-title">
                        <i class="fas fa-lightbulb"></i> 智能建议
                    </div>
                    <div class="suggestion-text">
                        根据您的输入，建议将此任务放在<strong>重要&紧急</strong>象限
                    </div>
                </div>

                <!-- 象限选择 -->
                <div class="form-group">
                    <label class="form-label">选择象限</label>
                    <div class="quadrant-selector">
                        <div class="quadrant-option selected" onclick="selectQuadrant(this, 'urgent-important')">
                            <div class="quadrant-option-icon">🔴</div>
                            <div class="quadrant-option-label">重要&紧急</div>
                            <div class="quadrant-option-desc">立即处理</div>
                        </div>
                        <div class="quadrant-option" onclick="selectQuadrant(this, 'not-urgent-important')">
                            <div class="quadrant-option-icon">🟠</div>
                            <div class="quadrant-option-label">重要&不紧急</div>
                            <div class="quadrant-option-desc">计划处理</div>
                        </div>
                        <div class="quadrant-option" onclick="selectQuadrant(this, 'urgent-not-important')">
                            <div class="quadrant-option-icon">🟢</div>
                            <div class="quadrant-option-label">不重要&紧急</div>
                            <div class="quadrant-option-desc">委派处理</div>
                        </div>
                        <div class="quadrant-option" onclick="selectQuadrant(this, 'not-urgent-not-important')">
                            <div class="quadrant-option-icon">🟤</div>
                            <div class="quadrant-option-label">不重要&不紧急</div>
                            <div class="quadrant-option-desc">休闲娱乐</div>
                        </div>
                    </div>
                </div>

                <!-- 截止日期 -->
                <div class="form-group">
                    <label class="form-label">截止日期</label>
                    <input type="date" class="form-input" id="dueDate">
                </div>

                <!-- 预计时长 -->
                <div class="form-group">
                    <label class="form-label">预计时长</label>
                    <div class="time-picker">
                        <input type="number" class="time-input" placeholder="0" min="0" max="999" id="estimatedTime" value="60">
                        <span class="time-unit">分钟</span>
                    </div>
                </div>

                <!-- 标签 -->
                <div class="form-group">
                    <label class="form-label">标签</label>
                    <div class="tag-input-container">
                        <input type="text" class="tag-input" placeholder="输入标签，按Enter添加" id="tagInput" onkeypress="handleTagInput(event)">
                    </div>
                    <div style="margin-top: 8px; font-size: 12px; color: #8E8E93;">
                        建议标签：工作、学习、健康、生活、紧急
                    </div>
                </div>

                <!-- 按钮 -->
                <div class="form-buttons">
                    <button type="button" class="form-btn form-btn-secondary" onclick="closeModal()">
                        取消
                    </button>
                    <button type="submit" class="form-btn form-btn-primary">
                        <i class="fas fa-check"></i> 创建任务
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let selectedQuadrant = 'urgent-important';
        const tags = [];

        function selectQuadrant(element, quadrant) {
            document.querySelectorAll('.quadrant-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedQuadrant = quadrant;
        }

        function handleTagInput(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const input = event.target;
                const tag = input.value.trim();
                if (tag) {
                    addTag(tag);
                    input.value = '';
                }
            }
        }

        function addTag(tag) {
            if (!tags.includes(tag)) {
                tags.push(tag);
                updateTagDisplay();
            }
        }

        function removeTag(tag) {
            tags.splice(tags.indexOf(tag), 1);
            updateTagDisplay();
        }

        function updateTagDisplay() {
            const container = document.querySelector('.tag-input-container');
            const input = container.querySelector('.tag-input');
            
            // 清空容器中的标签
            container.querySelectorAll('.tag').forEach(t => t.remove());
            
            // 重新添加标签
            tags.forEach(tag => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag';
                tagEl.innerHTML = `
                    ${tag}
                    <span class="tag-remove" onclick="removeTag('${tag}')">
                        <i class="fas fa-times"></i>
                    </span>
                `;
                container.insertBefore(tagEl, input);
            });
        }

        function submitTask(event) {
            event.preventDefault();
            
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDesc').value;
            const dueDate = document.getElementById('dueDate').value;
            const estimatedTime = parseInt(document.getElementById('estimatedTime').value) || 60;

            const taskData = {
                title,
                description,
                quadrant: selectedQuadrant,
                dueDate: dueDate ? new Date(dueDate).toISOString() : new Date(Date.now() + 86400000).toISOString(),
                estimatedTime,
                tags
            };

            console.log('Task created:', taskData);
            
            // 显示成功提示
            showToast('任务已创建！', 'success');
            
            // 关闭模态框
            setTimeout(() => {
                closeModal();
            }, 500);
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            window.history.back();
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '100px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.padding = '12px 16px';
            toast.style.borderRadius = '8px';
            toast.style.color = 'white';
            toast.style.zIndex = '2000';
            
            if (type === 'success') {
                toast.style.background = '#34C759';
            }
            
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始化
        window.addEventListener('load', () => {
            // 设置默认截止日期为明天
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('dueDate').valueAsDate = tomorrow;
        });
    </script>
</body>
</html>
