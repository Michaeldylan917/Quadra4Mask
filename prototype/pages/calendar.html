<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadTask - 日历视图</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-title {
            font-size: 18px;
            font-weight: 700;
            color: #000;
        }

        .calendar-nav {
            display: flex;
            gap: 8px;
        }

        .calendar-nav-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: #F2F2F7;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 150ms ease-in-out;
        }

        .calendar-nav-btn:active {
            background: #E5E5EA;
        }

        .calendar-grid {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .calendar-weekday {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;
            padding: 8px 0;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 150ms ease-in-out;
            position: relative;
            background: #F2F2F7;
            color: #8E8E93;
        }

        .calendar-day.current-month {
            background: white;
            color: #000;
            border: 1px solid #E5E5EA;
        }

        .calendar-day.today {
            background: #007AFF;
            color: white;
            font-weight: 700;
        }

        .calendar-day.selected {
            background: #E8F4FF;
            border: 2px solid #007AFF;
        }

        .calendar-day.has-tasks::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: #FF3B30;
            border-radius: 50%;
        }

        .calendar-day.today.has-tasks::after {
            background: white;
        }

        .calendar-day:active {
            transform: scale(0.95);
        }

        .calendar-legend {
            display: flex;
            gap: 16px;
            font-size: 12px;
            margin-bottom: 16px;
            padding: 12px;
            background: #F2F2F7;
            border-radius: 8px;
        }

        .calendar-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .calendar-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .calendar-legend-dot.urgent-important {
            background: #FF3B30;
        }

        .calendar-legend-dot.not-urgent-important {
            background: #FF9500;
        }

        .calendar-legend-dot.urgent-not-important {
            background: #34C759;
        }

        .calendar-legend-dot.not-urgent-not-important {
            background: #A2845E;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #007AFF;
            cursor: pointer;
            transition: all 150ms ease-in-out;
        }

        .task-list-item.urgent-important {
            border-left-color: #FF3B30;
        }

        .task-list-item.not-urgent-important {
            border-left-color: #FF9500;
        }

        .task-list-item.urgent-not-important {
            border-left-color: #34C759;
        }

        .task-list-item.not-urgent-not-important {
            border-left-color: #A2845E;
        }

        .task-list-item:active {
            background: #F2F2F7;
        }

        .task-list-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #E5E5EA;
            border-radius: 6px;
            cursor: pointer;
            transition: all 150ms ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-list-checkbox.checked {
            background: #34C759;
            border-color: #34C759;
            color: white;
        }

        .task-list-content {
            flex: 1;
        }

        .task-list-title {
            font-size: 14px;
            font-weight: 600;
            color: #000;
        }

        .task-list-time {
            font-size: 12px;
            color: #8E8E93;
            margin-top: 2px;
        }

        .task-list-time.overdue {
            color: #FF3B30;
        }

        .week-view {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .week-day {
            flex: 0 0 calc(100% / 7);
            background: white;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid #E5E5EA;
            min-width: 50px;
        }

        .week-day.today {
            background: #E8F4FF;
            border-color: #007AFF;
        }

        .week-day-name {
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;
            margin-bottom: 4px;
        }

        .week-day-date {
            font-size: 16px;
            font-weight: 700;
            color: #000;
        }

        .week-day-tasks {
            font-size: 11px;
            color: #007AFF;
            margin-top: 4px;
            font-weight: 600;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            color: #8E8E93;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="iphone-frame">
        <div class="iphone-screen">
            <!-- 状态栏 -->
            <div class="status-bar">
                <div class="status-bar-left">
                    <span>9:41</span>
                </div>
                <div class="status-bar-center"></div>
                <div class="status-bar-right">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>

            <!-- 导航栏 -->
            <div class="nav-bar">
                <div class="nav-bar-left" onclick="history.back()">
                    <i class="fas fa-chevron-left"></i>
                </div>
                <div class="nav-bar-title">日历视图</div>
                <div class="nav-bar-right">
                    <i class="fas fa-cog"></i>
                </div>
            </div>

            <!-- 内容区域 -->
            <div class="page-content">
                <!-- 日历头部 -->
                <div class="calendar-header">
                    <div class="calendar-title" id="calendarMonth">2025年12月</div>
                    <div class="calendar-nav">
                        <button class="calendar-nav-btn" onclick="prevMonth()">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button class="calendar-nav-btn" onclick="goToToday()">
                            <i class="fas fa-calendar-day"></i>
                        </button>
                        <button class="calendar-nav-btn" onclick="nextMonth()">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>

                <!-- 日历图例 -->
                <div class="calendar-legend">
                    <div class="calendar-legend-item">
                        <div class="calendar-legend-dot urgent-important"></div>
                        <span>紧急重要</span>
                    </div>
                    <div class="calendar-legend-item">
                        <div class="calendar-legend-dot not-urgent-important"></div>
                        <span>重要</span>
                    </div>
                    <div class="calendar-legend-item">
                        <div class="calendar-legend-dot urgent-not-important"></div>
                        <span>紧急</span>
                    </div>
                </div>

                <!-- 日历网格 -->
                <div class="calendar-grid">
                    <div class="calendar-weekdays">
                        <div class="calendar-weekday">日</div>
                        <div class="calendar-weekday">一</div>
                        <div class="calendar-weekday">二</div>
                        <div class="calendar-weekday">三</div>
                        <div class="calendar-weekday">四</div>
                        <div class="calendar-weekday">五</div>
                        <div class="calendar-weekday">六</div>
                    </div>
                    <div class="calendar-days" id="calendarDays">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 周视图 -->
                <div class="mb-lg">
                    <h3 class="text-sm font-semibold mb-2">本周任务</h3>
                    <div class="week-view">
                        <div class="week-day today">
                            <div class="week-day-name">今天</div>
                            <div class="week-day-date">3</div>
                            <div class="week-day-tasks">2个任务</div>
                        </div>
                        <div class="week-day">
                            <div class="week-day-name">明天</div>
                            <div class="week-day-date">4</div>
                            <div class="week-day-tasks">1个任务</div>
                        </div>
                        <div class="week-day">
                            <div class="week-day-name">周四</div>
                            <div class="week-day-date">5</div>
                            <div class="week-day-tasks">0个任务</div>
                        </div>
                        <div class="week-day">
                            <div class="week-day-name">周五</div>
                            <div class="week-day-date">6</div>
                            <div class="week-day-tasks">3个任务</div>
                        </div>
                        <div class="week-day">
                            <div class="week-day-name">周六</div>
                            <div class="week-day-date">7</div>
                            <div class="week-day-tasks">1个任务</div>
                        </div>
                        <div class="week-day">
                            <div class="week-day-name">周日</div>
                            <div class="week-day-date">8</div>
                            <div class="week-day-tasks">0个任务</div>
                        </div>
                        <div class="week-day">
                            <div class="week-day-name">周一</div>
                            <div class="week-day-date">9</div>
                            <div class="week-day-tasks">2个任务</div>
                        </div>
                    </div>
                </div>

                <!-- 今日任务列表 -->
                <div>
                    <h3 class="text-sm font-semibold mb-2">今日任务</h3>
                    <div class="task-list">
                        <div class="task-list-item urgent-important" onclick="openTaskDetail()">
                            <div class="task-list-checkbox"></div>
                            <div class="task-list-content">
                                <div class="task-list-title">完成项目提案</div>
                                <div class="task-list-time">09:00 - 11:00</div>
                            </div>
                        </div>
                        <div class="task-list-item not-urgent-important" onclick="openTaskDetail()">
                            <div class="task-list-checkbox"></div>
                            <div class="task-list-content">
                                <div class="task-list-title">学习ArkTS框架</div>
                                <div class="task-list-time">14:00 - 16:00</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部 TabBar -->
            <div class="tab-bar">
                <div class="tab-bar-item">
                    <div class="tab-bar-icon"><i class="fas fa-home"></i></div>
                    <div class="tab-bar-label">首页</div>
                </div>
                <div class="tab-bar-item active">
                    <div class="tab-bar-icon"><i class="fas fa-calendar"></i></div>
                    <div class="tab-bar-label">日历</div>
                </div>
                <div class="tab-bar-item">
                    <div class="tab-bar-icon"><i class="fas fa-chart-pie"></i></div>
                    <div class="tab-bar-label">统计</div>
                </div>
                <div class="tab-bar-item">
                    <div class="tab-bar-icon"><i class="fas fa-cog"></i></div>
                    <div class="tab-bar-label">设置</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // 更新标题
            const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            document.getElementById('calendarMonth').textContent = `${year}年${monthNames[month]}`;
            
            // 获取第一天和最后一天
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const prevLastDay = new Date(year, month, 0);
            
            const firstDayOfWeek = firstDay.getDay();
            const lastDateOfMonth = lastDay.getDate();
            const lastDateOfPrevMonth = prevLastDay.getDate();
            
            const daysContainer = document.getElementById('calendarDays');
            daysContainer.innerHTML = '';
            
            // 上月的日期
            for (let i = firstDayOfWeek - 1; i >= 0; i--) {
                const day = document.createElement('div');
                day.className = 'calendar-day';
                day.textContent = lastDateOfPrevMonth - i;
                daysContainer.appendChild(day);
            }
            
            // 本月的日期
            const today = new Date();
            for (let i = 1; i <= lastDateOfMonth; i++) {
                const day = document.createElement('div');
                day.className = 'calendar-day current-month';
                day.textContent = i;
                
                // 标记今天
                if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
                    day.classList.add('today');
                }
                
                // 标记有任务的日期
                if ([1, 3, 5, 6, 10, 15, 20].includes(i)) {
                    day.classList.add('has-tasks');
                }
                
                day.onclick = () => selectDate(i);
                daysContainer.appendChild(day);
            }
            
            // 下月的日期
            const totalCells = daysContainer.children.length;
            const remainingCells = 42 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                const day = document.createElement('div');
                day.className = 'calendar-day';
                day.textContent = i;
                daysContainer.appendChild(day);
            }
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function selectDate(day) {
            console.log(`Selected date: ${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${day}`);
        }

        function openTaskDetail() {
            window.location.hash = '#task-detail';
        }

        // 初始化
        window.addEventListener('load', () => {
            renderCalendar();
        });
    </script>
</body>
</html>
